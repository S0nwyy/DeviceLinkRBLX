<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeviceLink</title>


<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

margin:0;
width:100vw;
height:100vh;

overflow:hidden;

background:
linear-gradient(135deg,#477cff,#0b0b12);

color:white;

}



#app{

width:100%;
height:100%;

display:flex;
align-items:center;
justify-content:center;

transition:1s;

}



.hidden{

opacity:0;
transform:scale(.85);

}



.card{

width:100%;
height:100%;

max-width:520px;

background:rgba(20,20,30,.9);

backdrop-filter:blur(30px);

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

padding:30px;

text-align:center;

}



h1{

font-size:42px;

}



.icon{

font-size:80px;

}



input{

width:100%;
max-width:400px;

height:75px;

border-radius:25px;

border:0;

outline:none;

background:#080812;

color:white;

font-size:40px;

text-align:center;

letter-spacing:12px;

}



button{

margin-top:20px;

width:100%;
max-width:400px;

height:65px;

border:0;

border-radius:25px;

background:#477cff;

color:white;

font-size:22px;

font-weight:bold;

}



#slots{

display:none;

gap:15px;

margin-top:30px;

}



.slot{

width:65px;

height:65px;

border-radius:18px;

transition:.2s;

}



.red{
background:#ff3b3b;
}


.orange{
background:#ff8c32;
}


.yellow{
background:#ffe43b;
}


.green{
background:#45ff76;
}



#choices{

display:none;

margin-top:25px;

gap:12px;

flex-wrap:wrap;

justify-content:center;

}



.choice{

width:65px;

height:65px;

border-radius:20px;

border:0;

}



#status{

margin-top:25px;

font-size:22px;

}


</style>


</head>



<body>



<div id="app">


<div class="card">


<div class="icon">
📱
</div>


<h1>
DeviceLink
</h1>


<p>
Enter Roblox code
</p>


<input 
id="code"
maxlength="6"
inputmode="numeric"
>



<button onclick="connect()">
Connect
</button>



<div id="slots">

<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>

</div>



<div id="choices"></div>



<div id="status">
Waiting...
</div>


</div>


</div>




<script>


const FIREBASE =
"https://devicelinkrblx-default-rtdb.firebaseio.com";



let currentCode=null;

let answer=[];

let selected=[];

let attempts=3;

let timer=null;



const colors=[

"red",
"orange",
"yellow",
"green"

];



document
.getElementById("code")
.oninput=function(){

this.value=this.value.replace(/[^0-9]/g,"");

}




function colorClass(c){

return c;

}




function sleep(ms){

return new Promise(r=>setTimeout(r,ms));

}




async function connect(){


let status=document.getElementById("status");

let code=
document.getElementById("code").value;



if(code.length!==6){

status.innerHTML="❌ Enter 6 numbers";

return;

}



let res=await fetch(

FIREBASE+
"/connections/"+code+".json"

);



let data=await res.json();



if(!data){

status.innerHTML="❌ Invalid code";

return;

}



if(data.connected){

status.innerHTML="❌ Already connected";

return;

}



currentCode=code;



await fetch(

FIREBASE+
"/connections/"+code+".json",

{

method:"PATCH",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

connected:true,

heartbeat:Date.now()

})

}

);



document.querySelector("input").style.display="none";

document.querySelector("button").style.display="none";



status.innerHTML="📡 Connected";


startRoll(data.sequence);



timer=setInterval(()=>{


fetch(

FIREBASE+
"/connections/"+currentCode+".json",

{

method:"PATCH",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

heartbeat:Date.now()

})

}

);


},5000);



}




async function startRoll(sequence){


let slots=document.querySelectorAll(".slot");

let box=document.getElementById("slots");

box.style.display="flex";


for(let i=0;i<4;i++){


for(let j=0;j<15;j++){


slots[i].className=
"slot "+colors[Math.floor(Math.random()*4)];


await sleep(70);


}


slots[i].className=
"slot "+sequence[i];


}



answer=sequence;



showChoices();


}





function showChoices(){


let box=document.getElementById("choices");


box.style.display="flex";


box.innerHTML="";


colors.forEach(c=>{


let b=document.createElement("button");


b.className="choice "+c;


b.onclick=()=>pick(c);


box.appendChild(b);


});


}




function pick(c){


selected.push(c);



if(selected.length===4){


check();


}


}




async function check(){


let correct=true;


for(let i=0;i<4;i++){


if(selected[i]!==answer[i]){

correct=false;

}

}



if(correct){


document.getElementById("status").innerHTML=
"✅ Verified";


await fetch(

FIREBASE+
"/connections/"+currentCode+".json",

{

method:"PATCH",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

verified:true

})

}

);



document
.getElementById("app")
.classList.add("hidden");



}else{


attempts--;


selected=[];



document.getElementById("status").innerHTML=
"❌ Wrong - Attempts left: "+attempts;



if(attempts<=0){


document.getElementById("status").innerHTML=
"❌ Failed. Enter code again";


clearInterval(timer);


}


}



}

</script>


</body>

</html>
