<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeviceLink</title>


<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

margin:0;
height:100vh;
width:100vw;

overflow:hidden;

background:
linear-gradient(135deg,#4d8dff,#090912);

display:flex;
align-items:center;
justify-content:center;

color:white;

}



#app{

width:100%;
height:100%;

display:flex;
align-items:center;
justify-content:center;

transition:1s;

}



.hide{

opacity:0;
transform:scale(.85);

}



.card{

width:90%;
max-width:430px;

background:rgba(20,20,30,.9);

backdrop-filter:blur(25px);

border-radius:35px;

padding:25px;

display:flex;

flex-direction:column;

align-items:center;

gap:20px;

text-align:center;

}



h1{

font-size:38px;

margin:0;

}



input{

width:100%;

height:70px;

border:none;

outline:none;

border-radius:25px;

background:#080812;

color:white;

font-size:35px;

letter-spacing:8px;

text-align:center;

}



button{

width:100%;

height:60px;

border:none;

border-radius:25px;

background:#4d8dff;

color:white;

font-size:22px;

font-weight:bold;

}



#slots{

display:flex;

gap:12px;

}



.slot{

width:65px;

height:65px;

border-radius:20px;

}



.red{
background:#ff4040;
}

.yellow{
background:#ffe640;
}

.green{
background:#40ff80;
}

.blue{
background:#4090ff;
}



#status{

font-size:20px;

}



</style>

</head>


<body>


<div id="app">

<div class="card">


<h1>
📱 DeviceLink
</h1>


<input 
id="code"
maxlength="6"
inputmode="numeric"
placeholder="000000"
>


<button onclick="connect()">
Connect
</button>


<div id="slots" style="display:none">

<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>

</div>


<div id="status">
Waiting...
</div>


</div>

</div>



<script>


const FIREBASE =
"https://devicelinkrblx-default-rtdb.firebaseio.com";



let code="";

let heartbeat;



const colors=[

"red",
"yellow",
"green",
"blue"

];



document
.getElementById("code")
.oninput=function(){

this.value=this.value.replace(/[^0-9]/g,"");

}





function sleep(ms){

return new Promise(
resolve=>setTimeout(resolve,ms)
);

}





function randomPattern(){

let arr=[];


for(let i=0;i<4;i++){

arr.push(
colors[Math.floor(Math.random()*colors.length)]
);

}


return arr;

}





async function connect(){


code=document
.getElementById("code")
.value;



let status=document
.getElementById("status");



if(code.length!==6){

status.innerHTML=
"❌ Enter 6 numbers";

return;

}



let response=await fetch(

FIREBASE+
"/connections/"+code+".json"

);



let data=await response.json();



if(!data){

status.innerHTML=
"❌ Code not found";

return;

}



if(data.connected){

status.innerHTML=
"❌ Already connected";

return;

}



let pattern=randomPattern();



await fetch(

FIREBASE+
"/connections/"+code+".json",

{

method:"PATCH",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

connected:true,

pattern:pattern,

heartbeat:Date.now()

})

}

);



document
.querySelector("input")
.style.display="none";


document
.querySelector("button")
.style.display="none";



status.innerHTML=
"🎰 Generating pattern...";



await roll(pattern);



heartbeat=setInterval(()=>{


fetch(

FIREBASE+
"/connections/"+code+".json",

{

method:"PATCH",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

heartbeat:Date.now()

})

}

);


},5000);



}





async function roll(pattern){


let slots=
document.querySelectorAll(".slot");


document
.getElementById("slots")
.style.display="flex";



for(let i=0;i<4;i++){


for(let x=0;x<15;x++){


slots[i]
.className=
"slot "+
colors[
Math.floor(
Math.random()*colors.length
)
];


await sleep(80);


}



slots[i]
.className=
"slot "+
pattern[i];


}



document
.getElementById("status")
.innerHTML=
"✅ Pattern sent to Roblox";


}



</script>


</body>

</html>
