<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeviceLink</title>

<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

margin:0;
width:100vw;
height:100vh;

background:
linear-gradient(135deg,#101020,#304cff);

display:flex;
align-items:center;
justify-content:center;

overflow:hidden;

color:white;

}


.card{

width:92%;
max-width:430px;

background:rgba(20,20,35,.95);

border-radius:35px;

padding:25px;

display:flex;

flex-direction:column;

align-items:center;

gap:20px;

text-align:center;

box-shadow:0 0 40px rgba(0,0,0,.5);

}


h1{

margin:0;

font-size:38px;

}



input{

width:100%;

height:70px;

border:none;

outline:none;

border-radius:25px;

background:#080812;

color:white;

font-size:35px;

text-align:center;

letter-spacing:8px;

}



button{

width:100%;

height:60px;

border:none;

border-radius:25px;

background:#4d8dff;

color:white;

font-size:22px;

font-weight:bold;

}



#slots{

display:none;

gap:12px;

}



.slot{

width:65px;

height:65px;

border-radius:20px;

transition:.15s;

transform:scale(1);

}



.slot.spin{

animation:spin .12s infinite alternate;

}



@keyframes spin{

from{

transform:scale(.85) rotate(-5deg);

}

to{

transform:scale(1.1) rotate(5deg);

}

}



.red{

background:#ff3b3b;

}


.blue{

background:#4080ff;

}


.green{

background:#40ff80;

}


.yellow{

background:#ffe640;

}



#status{

font-size:20px;

}


</style>

</head>


<body>


<div class="card">


<h1>
📱 DeviceLink
</h1>



<input
id="code"
maxlength="6"
inputmode="numeric"
placeholder="000000"
>



<button onclick="connect()">
Connect
</button>



<div id="slots">


<div class="slot"></div>

<div class="slot"></div>

<div class="slot"></div>

<div class="slot"></div>


</div>



<div id="status">
Waiting...
</div>


</div>




<script>


const FIREBASE =
"https://devicelinkrblx-default-rtdb.firebaseio.com";



let currentCode="";

let heartbeat;



const colors=[
"red",
"blue",
"green",
"yellow"
];



document
.getElementById("code")
.addEventListener(
"input",
function(){

this.value=this.value.replace(
/[^0-9]/g,
""
);

}
);




function sleep(ms){

return new Promise(
r=>setTimeout(r,ms)
);

}





function createPattern(){

let result=[];


for(let i=0;i<4;i++){

result.push(
colors[
Math.floor(
Math.random()*colors.length
)
]
);

}


return result;

}





async function connect(){


const input =
document.getElementById("code");


currentCode=input.value;



const status =
document.getElementById("status");



if(currentCode.length!==6){

status.innerHTML=
"❌ Enter 6 numbers";

return;

}



let check =
await fetch(

FIREBASE+
"/connections/"+
currentCode+
".json"

);



let data =
await check.json();



if(!data){

status.innerHTML=
"❌ Invalid code";

return;

}



if(data.connected){

status.innerHTML=
"❌ Already connected";

return;

}



let pattern =
createPattern();



await fetch(

FIREBASE+
"/connections/"+
currentCode+
".json",

{

method:"PATCH",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

connected:true,

pattern:pattern,

heartbeat:Date.now()

})

}

);



input.style.display="none";

document
.querySelector("button")
.style.display="none";



status.innerHTML=
"🎰 Creating pattern...";



await animate(pattern);



heartbeat=setInterval(()=>{


fetch(

FIREBASE+
"/connections/"+
currentCode+
".json",

{

method:"PATCH",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

heartbeat:Date.now()

})

}

);


},5000);



}





async function animate(pattern){


let slots =
document.querySelectorAll(".slot");


document
.getElementById("slots")
.style.display="flex";



for(let i=0;i<4;i++){


slots[i].classList.add("spin");



for(let x=0;x<15;x++){


slots[i].className =
"slot "+

colors[
Math.floor(
Math.random()*colors.length
)
]

+" spin";



await sleep(80);


}



slots[i].className =
"slot "+pattern[i];


}



document
.getElementById("status")
.innerHTML=
"✅ Pattern sent to Roblox";


}



</script>


</body>

</html>
